# docker-compose.yml — orchestrates Postgres, Redis, backend worker, and middleware API

services:
  postgres:
    image: postgres:16
    container_name: quantum-shield-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cbom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: quantum-shield-redis
    ports:
      - "6379:6379"

  backend:
    image: python:3.11-slim
    container_name: quantum-shield-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bash -c "pip install -r requirements.txt && celery -A worker worker --loglevel=info"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  middleware:
    image: python:3.11-slim
    container_name: quantum-shield-middleware
    working_dir: /app
    volumes:
      - ./middleware:/app
    command: bash -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    depends_on:
      - backend
      - postgres
      - redis
    ports:
      - "8000:8000"

volumes:
  postgres_data:
